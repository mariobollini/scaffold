# Scaffold configuration example
# Copy to ~/.scaffold/config.yaml (or just run `scaffold organize` — it creates this automatically)

display:
  name: ""      # substring match against NSScreen.localizedName; empty = primary display
  columns: 4    # number of columns in the grid
  gap: 8        # pixels between zone edges
  margin: 0     # pixels inset from screen edges

# Zone definitions
# cols: column numbers (1-indexed). [1, 2] spans two adjacent columns.
# rows: full | top (upper half) | bottom (lower half)
#
# Default: 3 full-height columns + a right column split into top/bottom rows.
zones:
  col-1:  { cols: [1], rows: full   }
  col-2:  { cols: [2], rows: full   }
  col-3:  { cols: [3], rows: full   }
  col-4t: { cols: [4], rows: top    }
  col-4b: { cols: [4], rows: bottom }
